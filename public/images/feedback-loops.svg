<svg viewBox="0 0 800 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .pane-rect { fill: var(--pane-bg); stroke: var(--border); stroke-width: 1.5; rx: 8px; }
      .pane-title { font-family: system-ui, -apple-system, sans-serif; font-size: 15px; font-weight: 700; fill: var(--text); }
      
      .node-rect { fill: var(--bg); stroke: var(--border); stroke-width: 1.2; rx: 6px; }
      .node-text { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: var(--text); font-weight: 500; }
      .node-title { font-weight: 700; }
      
      .arrow { stroke: var(--muted); stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      
      .accent-blue { fill: var(--blue-bg); stroke: var(--blue-border); }
      .accent-purple { fill: var(--purple-bg); stroke: var(--purple-border); }
      
      :root {
        --bg: #ffffff;
        --pane-bg: #faf9f6;
        --border: #cbd5e1;
        --text: #0f172a;
        --muted: #64748b;
        
        --blue-bg: #eff6ff;
        --blue-border: #2563eb;
        --purple-bg: #faf5ff;
        --purple-border: #7c3aed;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1c1917;
          --pane-bg: #121110;
          --border: #334155;
          --text: #f8fafc;
          --muted: #94a3b8;
          
          --blue-bg: rgba(37, 99, 235, 0.12);
          --blue-border: #60a5fa;
          --purple-bg: rgba(124, 58, 237, 0.12);
          --purple-border: #c084fc;
        }
      }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/>
    </marker>
  </defs>

  <!-- Solid Background to prevent transparent theme collisions -->
  <rect width="800" height="240" fill="var(--pane-bg)" />

  <!-- Panel 1: Inner Loop -->
  <g transform="translate(10, 10)">
    <rect class="pane-rect" width="370" height="210" />
    <text class="pane-title" x="20" y="30">🔄 Inner Loop (Gameplay Execution)</text>
    
    <!-- Inner Nodes -->
    <g transform="translate(20, 60)">
      <rect class="node-rect" width="100" height="40" />
      <text class="node-text" x="50" y="24" text-anchor="middle">Board FEN</text>
    </g>
    
    <line class="arrow" x1="120" y1="80" x2="150" y2="80" />
    
    <g transform="translate(150, 60)">
      <rect class="node-rect accent-blue" width="80" height="40" />
      <text class="node-text node-title" x="40" y="24" text-anchor="middle" fill="var(--blue-border)">LLM</text>
    </g>
    
    <line class="arrow" x1="230" y1="80" x2="260" y2="80" />
    
    <g transform="translate(260, 60)">
      <rect class="node-rect accent-blue" width="90" height="40" />
      <text class="node-text node-title" x="45" y="24" text-anchor="middle" fill="var(--blue-border)">Referee</text>
    </g>
    
    <path class="arrow" d="M 305 100 L 305 140 L 65 140 L 65 100" />
    
    <g transform="translate(110, 150)">
      <rect class="node-rect" width="160" height="40" />
      <text class="node-text" x="80" y="24" text-anchor="middle">Valid Chess Move</text>
    </g>
  </g>

  <!-- Panel 2: Outer Loop -->
  <g transform="translate(420, 10)">
    <rect class="pane-rect" width="370" height="210" />
    <text class="pane-title" x="20" y="30">⚙️ Outer Loop (Meta-Harness Tuning)</text>
    
    <!-- Outer Nodes -->
    <g transform="translate(20, 60)">
      <rect class="node-rect" width="90" height="40" />
      <text class="node-text" x="45" y="24" text-anchor="middle">Logs</text>
    </g>
    
    <line class="arrow" x1="110" y1="80" x2="140" y2="80" />
    
    <g transform="translate(140, 60)">
      <rect class="node-rect accent-purple" width="90" height="40" />
      <text class="node-text node-title" x="45" y="24" text-anchor="middle" fill="var(--purple-border)">Autopsy</text>
    </g>
    
    <line class="arrow" x1="230" y1="80" x2="260" y2="80" />
    
    <g transform="translate(260, 60)">
      <rect class="node-rect accent-purple" width="90" height="40" />
      <text class="node-text node-title" x="45" y="24" text-anchor="middle" fill="var(--purple-border)">Synthesizer</text>
    </g>
    
    <path class="arrow" d="M 305 100 L 305 140 L 65 140 L 65 100" />
    
    <g transform="translate(110, 150)">
      <rect class="node-rect" width="160" height="40" />
      <text class="node-text" x="80" y="24" text-anchor="middle">Optimized Prompt V2</text>
    </g>
  </g>
</svg>
